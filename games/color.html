<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カラーマッチポップ</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 20px;
        }
        /* 広告スペース（上部） */
        .ad-top {
            width: 320px;
            height: 50px;
            background-color: #222;
            margin: 10px auto;
            line-height: 50px;
            font-size: 11px;
            color: #666;
            border: 1px dashed #444;
        }
        /* 次に押す色をデカデカと出すエリア */
        #colorTarget {
            width: 200px;
            height: 100px;
            margin: 20px auto;
            border-radius: 10px;
            font-size: 40px;
            line-height: 100px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        /* ボタン */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .game-btn {
            width: 90px;
            height: 60px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .color-red { background-color: #ff4757; }
        .color-green { background-color: #2ed573; }
        .color-yellow { background-color: #ffa502; }
    </style>
</head>
<body>

    <div class="ad-top">【ここに広告バナー（320×50）】</div>

    <h2>スコア: <span id="scoreText">0</span></h2>
    
    <p>この色と同じボタンを叩け！</p>
    
    <!-- ここに「赤」「緑」「黄」のどれかが大きく表示される -->
    <div id="colorTarget"></div>

    <div class="btn-container">
        <button class="game-btn color-red" onclick="press('red')">赤</button>
        <button class="game-btn color-green" onclick="press('green')">緑</button>
        <button class="game-btn color-yellow" onclick="press('yellow')">黄</button>
    </div>

<script>
let score = 0;
let currentTargetColor = '';
const colors = ['red', 'green', 'yellow'];
const colorNames = { 'red': '赤', 'green': '緑', 'yellow': '黄' };

// お題の色をランダムに変える関数
function nextColor() {
    currentTargetColor = colors[Math.floor(Math.random() * colors.length)];
    const targetDiv = document.getElementById('colorTarget');
    
    // 背景色とお題の文字をセット
    if (currentTargetColor === 'red') targetDiv.className = 'color-red';
    if (currentTargetColor === 'green') targetDiv.className = 'color-green';
    if (currentTargetColor === 'yellow') targetDiv.className = 'color-yellow';
    
    targetDiv.innerText = colorNames[currentTargetColor];
}

// ボタンが押されたときの処理（さっきのポップアップと同じ確実な動かし方）
function press(playerChoice) {
    if (playerChoice === currentTargetColor) {
        // 正解なら10点プラスしてお題をチェンジ
        score += 10;
        document.getElementById('scoreText').innerText = score;
        nextColor();
    } else {
        // 間違えたらマイナス10点
        score = Math.max(0, score - 10);
        document.getElementById('scoreText').innerText = score;
    }
}

// 最初に1回お題を出す
nextColor();
</script>
</body>
</html>
