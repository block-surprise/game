<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CRANE MASTER - PROTOTYPE</title>
    <style>
        body { margin: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #1a1a1a; border: 4px solid #333; border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="craneGame"></canvas>

<script>
const canvas = document.getElementById('craneGame');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 600;

// ガチのパラメータ設定
const crane = {
    x: 50,
    y: 50,
    width: 60,
    height: 40,
    armL: 0.5, // アームの開き具合 (0: 閉じ, 1: 開き)
    state: 'IDLE', // IDLE, MOVE_X, MOVE_Y, CLAW_CLOSE, RETRACT
    speed: 3
};

const prize = { x: 200, y: 530, r: 25, grabbed: false };

function drawCrane() {
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 4;

    // 1. レールの描画
    ctx.beginPath();
    ctx.moveTo(0, 50); ctx.lineTo(canvas.width, 50);
    ctx.stroke();

    // 2. 紐（ワイヤー）
    ctx.beginPath();
    ctx.moveTo(crane.x + crane.width/2, 50);
    ctx.lineTo(crane.x + crane.width/2, crane.y);
    ctx.stroke();

    // 3. クレーン本体
    ctx.fillStyle = '#ff3e3e';
    ctx.fillRect(crane.x, crane.y, crane.width, crane.height);

    // 4. アーム（左右の爪）
    ctx.save();
    ctx.translate(crane.x + crane.width/2, crane.y + crane.height);
    
    const clawAngle = 0.3 + (crane.armL * 0.8); // アームの角度計算
    
    // 左の爪
    ctx.rotate(clawAngle);
    ctx.strokeRect(0, 0, 10, 40);
    ctx.rotate(-clawAngle);
    
    // 右の爪
    ctx.rotate(-clawAngle);
    ctx.strokeRect(-10, 0, 10, 40);
    
    ctx.restore();
}

function drawPrize() {
    ctx.fillStyle = prize.grabbed ? '#fff' : '#ffd700';
    ctx.beginPath();
    ctx.arc(prize.x, prize.y, prize.r, 0, Math.PI * 2);
    ctx.fill();
}

function update() {
    if (crane.state === 'MOVE_X') {
        crane.x += crane.speed;
        if (crane.x > canvas.width - crane.width) crane.state = 'IDLE';
    } else if (crane.state === 'MOVE_Y') {
        crane.y += crane.speed;
        if (crane.y > 450) crane.state = 'CLAW_CLOSE';
    } else if (crane.state === 'CLAW_CLOSE') {
        crane.armL -= 0.02;
        if (crane.armL <= 0) {
            // 当たり判定（簡易）
            const dx = (crane.x + crane.width/2) - prize.x;
            const dy = (crane.y + crane.height + 20) - prize.y;
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) prize.grabbed = true;
            crane.state = 'RETRACT';
        }
    } else if (crane.state === 'RETRACT') {
        crane.y -= crane.speed;
        if (prize.grabbed) {
            prize.x = crane.x + crane.width/2;
            prize.y = crane.y + crane.height + 20;
        }
        if (crane.y <= 50) {
            crane.state = 'IDLE';
            // ここで景品を落とす処理などを入れる
        }
    }
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    update();
    drawPrize();
    drawCrane();
    requestAnimationFrame(loop);
}

// 操作系
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        if (crane.state === 'IDLE') {
            crane.state = 'MOVE_X';
            crane.armL = 1; // 最初に開く
        }
    }
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
        if (crane.state === 'MOVE_X') crane.state = 'MOVE_Y';
    }
});

loop();
</script>
</body>
</html>
