<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHOP TYCOON ALPHA</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #header { padding: 20px; background: #333; display: flex; justify-content: space-between; font-size: 1.2rem; border-bottom: 4px solid #00ffcc; }
        #store { position: relative; width: 100%; height: 60%; background: #222; border-bottom: 2px solid #444; }
        #controls { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #444; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; }
        .btn:active { background: #00ffcc; color: #000; }
        .customer { position: absolute; width: 30px; height: 30px; background: #ff4500; border-radius: 50%; transition: all 0.5s ease; }
        .shelf { position: absolute; width: 80px; height: 40px; background: #555; border: 2px solid #888; text-align: center; line-height: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div>MONEY: $<span id="money">0</span></div>
            <div>LEVEL: <span id="level">1</span></div>
        </div>
        
        <div id="store" id="store-area">
            <div class="shelf" style="top: 150px; left: 50px;">SHELF A</div>
            <div class="shelf" style="top: 150px; left: 250px;">SHELF B</div>
            <div id="register" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width:60px; height:60px; background:#00ffcc; color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold; border-radius:5px;">CASHIER</div>
        </div>

        <div id="controls">
            <div class="btn" onclick="addCustomer()">客を呼ぶ</div>
            <div class="btn" onclick="upgradeRegister()">レジ強化 ($100)</div>
            <div class="btn" onclick="expandStore()">店を広げる ($500)</div>
            <div class="btn" onclick="restock()">在庫補充</div>
        </div>
    </div>

    <script>
        let money = 0;
        let level = 1;
        let cashierSpeed = 2000;
        const store = document.getElementById('store');
        const moneyEl = document.getElementById('money');

        function addCustomer() {
            const customer = document.createElement('div');
            customer.className = 'customer';
            customer.style.left = Math.random() * (window.innerWidth - 30) + 'px';
            customer.style.top = '0px';
            store.appendChild(customer);

            // 客が棚へ行く -> レジへ行く -> 消える という流れ
            setTimeout(() => {
                customer.style.top = '150px'; // 棚へ
                setTimeout(() => {
                    customer.style.top = (store.offsetHeight - 80) + 'px'; // レジへ
                    customer.style.left = '50%';
                    customer.style.transform = 'translateX(-50%)';
                    
                    setTimeout(() => {
                        money += 10;
                        updateUI();
                        customer.style.opacity = '0';
                        setTimeout(() => customer.remove(), 500);
                    }, cashierSpeed); // レジの処理時間
                }, 1000);
            }, 500);
        }

        function upgradeRegister() {
            if (money >= 100) {
                money -= 100;
                cashierSpeed *= 0.8; // 20%速くなる
                alert("レジが速くなりました！");
                updateUI();
            }
        }

        function expandStore() {
            if (money >= 500) {
                money -= 500;
                level++;
                document.getElementById('level').innerText = level;
                store.style.background = level % 2 === 0 ? '#2a2a3a' : '#222';
                updateUI();
                alert("店が大きくなりました！");
            }
        }

        function updateUI() {
            moneyEl.innerText = money;
        }
    </script>
</body>
</html>
